<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIRE Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0d0d;
      --surface: #141414;
      --border:  #1e1e1e;
      --border2: #2a2a2a;
      --text:    #e8e8e8;
      --muted:   #555;
      --muted2:  #333;
      --accent:  #c8a96e;
      --green:   #4a8c4a;
      --red:     #8c4a4a;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    .hidden { display: none !important; }

    /* ── Shared ── */
    .logo     { font-size: 1.4rem; font-weight: 200; letter-spacing: 0.25em; text-transform: uppercase; }
    .subtitle { color: var(--muted); font-size: 0.82rem; text-align: center; line-height: 1.7; }

    .form-group { width: 100%; display: flex; flex-direction: column; gap: 7px; }
    .form-label { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    input[type="password"],
    input[type="number"] {
      background: #181818; border: 1px solid var(--border2); color: var(--text);
      padding: 10px 13px; font-size: 0.92rem; border-radius: 4px;
      width: 100%; outline: none; transition: border-color 0.15s; font-family: inherit;
    }
    input:focus { border-color: #555; }
    input[type="range"] { width: 100%; accent-color: var(--accent); cursor: pointer; }

    .btn {
      background: var(--text); color: var(--bg); border: none;
      padding: 11px 24px; font-size: 0.82rem; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
      border-radius: 4px; transition: background 0.15s; width: 100%;
    }
    .btn:hover { background: #fff; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-ghost {
      background: transparent; color: var(--muted); border: 1px solid var(--border2);
      padding: 10px 24px; font-size: 0.78rem; font-weight: 500;
      letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
      border-radius: 4px; width: 100%; transition: color 0.15s, border-color 0.15s;
    }
    .btn-ghost:hover { color: #aaa; border-color: #444; }

    .err-msg { color: #c05050; font-size: 0.78rem; text-align: center; min-height: 1em; }
    a { color: var(--muted); font-size: 0.78rem; }
    a:hover { color: #999; }

    /* ── Auth screen ── */
    .center-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; min-height: 100vh; max-width: 420px; margin: 0 auto; padding: 40px 24px;
    }

    /* ── Main screen ── */
    .main-wrap { max-width: 960px; margin: 0 auto; padding: 28px 20px 60px; }

    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .top-logo { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted2); }
    .top-right { display: flex; align-items: center; gap: 12px; }
    .sync-badge { font-size: 0.68rem; letter-spacing: 0.04em; color: var(--muted2); }
    .sync-badge.ok  { color: var(--green); }
    .sync-badge.bad { color: var(--red); }
    .icon-btn { background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 1rem; padding: 4px; line-height: 1; transition: color 0.15s; }
    .icon-btn:hover { color: #888; }

    /* ── Two-column layout ── */
    .calc-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
    @media (max-width: 640px) { .calc-layout { grid-template-columns: 1fr; } }

    /* Input panel */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 22px; }
    .panel-title { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 18px; }

    .input-row { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .input-row:last-child { margin-bottom: 0; }

    .input-with-prefix { position: relative; display: flex; align-items: center; }
    .input-prefix { position: absolute; left: 13px; color: var(--muted); font-size: 0.85rem; pointer-events: none; z-index: 1; }
    .input-with-prefix input { padding-left: 24px; }

    .slider-row { display: flex; align-items: center; gap: 10px; }
    .slider-val { font-size: 0.9rem; font-weight: 300; min-width: 38px; text-align: right; font-variant-numeric: tabular-nums; }

    /* Result panel */
    .result-main {
      font-size: 2.6rem; font-weight: 200; font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em; margin-bottom: 4px; line-height: 1;
    }
    .result-sub { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; }

    .metrics { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
    .metric-row { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    .metric-row:last-child { border-bottom: none; padding-bottom: 0; }
    .metric-label { font-size: 0.72rem; color: var(--muted); }
    .metric-val { font-size: 1rem; font-weight: 300; font-variant-numeric: tabular-nums; }
    .metric-val.good { color: var(--accent); }
    .metric-val.warn { color: #c05050; }

    /* Savings split bar */
    .split-bar-wrap { margin-bottom: 0; }
    .split-bar { height: 5px; border-radius: 3px; background: var(--border2); overflow: hidden; margin-top: 6px; }
    .split-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s ease; }
    .split-labels { display: flex; justify-content: space-between; margin-top: 4px; }
    .split-label { font-size: 0.62rem; color: var(--muted); }

    /* Progress ring */
    .prog-ring-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
    .prog-ring { flex-shrink: 0; }
    .prog-info { display: flex; flex-direction: column; gap: 2px; }
    .prog-pct { font-size: 1.8rem; font-weight: 200; }
    .prog-desc { font-size: 0.68rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* Warning / already there */
    .banner {
      padding: 12px 16px; border-radius: 4px; font-size: 0.82rem; line-height: 1.5;
      margin-bottom: 16px;
    }
    .banner.success { background: #0e1f0e; border: 1px solid #2a4a2a; color: #7abf7a; }
    .banner.warning { background: #1f0e0e; border: 1px solid #4a2a2a; color: #bf7a7a; }

    /* ── Chart ── */
    .chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 5px; padding: 22px 16px 10px; }
    .chart-title { font-size: 0.65rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; padding-left: 6px; }
    #chart-svg { width: 100%; display: block; overflow: visible; }
  </style>
</head>
<body>

<!-- ── AUTH ── -->
<div id="s-auth" class="center-screen">
  <div class="logo">FIRE</div>
  <p class="subtitle">Financial Independence, Retire Early.<br>Connect GitHub to save your inputs.</p>
  <div class="form-group">
    <label class="form-label" for="pat">GitHub Personal Access Token</label>
    <input type="password" id="pat" placeholder="ghp_…" autocomplete="off" spellcheck="false">
  </div>
  <p class="subtitle">
    Needs <strong style="color:#777">gist</strong> scope —
    <a href="https://github.com/settings/tokens/new?scopes=gist&description=fire-calculator" target="_blank" rel="noopener">create classic token →</a>
  </p>
  <button class="btn" id="connect-btn">Connect</button>
  <div class="err-msg" id="auth-err"></div>
  <button class="btn-ghost" id="skip-btn">Skip — local only</button>
</div>

<!-- ── MAIN ── -->
<div id="s-main" class="hidden">
  <div class="main-wrap">

    <div class="top-bar">
      <span class="top-logo">FIRE Calculator</span>
      <div class="top-right">
        <span class="sync-badge" id="sync-badge"></span>
        <button class="icon-btn" id="sync-btn" title="Sync now">↻</button>
      </div>
    </div>

    <div class="calc-layout">

      <!-- Inputs -->
      <div class="panel">
        <div class="panel-title">Your Numbers</div>

        <div class="input-row">
          <label class="form-label">Current Age</label>
          <input type="number" id="i-age" min="18" max="80" value="30">
        </div>

        <div class="input-row">
          <label class="form-label">Annual Income (after tax)</label>
          <div class="input-with-prefix">
            <span class="input-prefix">$</span>
            <input type="number" id="i-income" min="0" step="1000" value="80000">
          </div>
        </div>

        <div class="input-row">
          <label class="form-label">Annual Expenses</label>
          <div class="input-with-prefix">
            <span class="input-prefix">$</span>
            <input type="number" id="i-expenses" min="0" step="1000" value="40000">
          </div>
        </div>

        <div class="input-row">
          <label class="form-label">Current Savings / Investments</label>
          <div class="input-with-prefix">
            <span class="input-prefix">$</span>
            <input type="number" id="i-savings" min="0" step="1000" value="20000">
          </div>
        </div>

        <div class="input-row">
          <label class="form-label">Expected Annual Return (real)</label>
          <div class="slider-row">
            <input type="range" id="i-return" min="1" max="12" step="0.5" value="7">
            <span class="slider-val" id="v-return">7%</span>
          </div>
        </div>

        <div class="input-row">
          <label class="form-label">Safe Withdrawal Rate</label>
          <div class="slider-row">
            <input type="range" id="i-swr" min="2" max="6" step="0.25" value="4">
            <span class="slider-val" id="v-swr">4%</span>
          </div>
        </div>
      </div>

      <!-- Results -->
      <div class="panel" id="results-panel">
        <div class="panel-title">Results</div>
        <div id="results-content"></div>
      </div>

    </div>

    <!-- Chart -->
    <div class="chart-wrap">
      <div class="chart-title">Portfolio Growth</div>
      <svg id="chart-svg" viewBox="0 0 800 220" xmlns="http://www.w3.org/2000/svg">
        <text x="400" y="110" text-anchor="middle" fill="#333" font-size="13">Enter your numbers to see the projection</text>
      </svg>
    </div>

  </div>
</div>

<script>
  const $ = id => document.getElementById(id);
  const API = 'https://api.github.com';
  const GF  = 'fire-settings.json';

  // ── State ──
  const S = { pat: null, gistId: null, local: false };
  let saveTimer = null;

  // ── Boot ──
  function boot() {
    S.pat    = ls('fire_pat');
    S.gistId = ls('fire_gist_id');
    S.local  = ls('fire_local') === '1';

    const saved = ls('fire_cfg');
    if (saved) {
      try {
        const c = JSON.parse(saved);
        if (c.age)      $('i-age').value      = c.age;
        if (c.income)   $('i-income').value   = c.income;
        if (c.expenses) $('i-expenses').value = c.expenses;
        if (c.savings)  $('i-savings').value  = c.savings;
        if (c.ret)      $('i-return').value   = c.ret;
        if (c.swr)      $('i-swr').value      = c.swr;
      } catch(_) {}
    }

    syncSliderDisplays();

    if (S.pat || S.local) {
      show('main'); calc();
      if (S.pat && S.gistId) pullGist();
    } else {
      show('auth');
    }
  }

  function show(name) {
    ['auth','main'].forEach(n => $('s-'+n).classList.add('hidden'));
    $('s-'+name).classList.remove('hidden');
  }

  // ── Auth ──
  $('connect-btn').onclick = async () => {
    const pat = $('pat').value.trim();
    if (!pat) return;
    setBtn('connect-btn', 'Connecting…', true);
    $('auth-err').textContent = '';
    try {
      const r = await ghFetch(pat, '/user');
      if (!r.ok) throw new Error('Invalid token — check scopes and try again.');
      S.pat = pat; ls('fire_pat', pat);
      const gist = await findGist(pat);
      if (gist) {
        S.gistId = gist.id; ls('fire_gist_id', gist.id);
        applyGist(gist); syncSliderDisplays();
      }
      show('main'); calc();
      if (S.pat && S.gistId) pullGist();
    } catch(e) {
      $('auth-err').textContent = e.message;
    } finally {
      setBtn('connect-btn', 'Connect', false);
    }
  };

  $('skip-btn').onclick = () => { S.local = true; ls('fire_local','1'); show('main'); calc(); };

  // ── Inputs ──
  function syncSliderDisplays() {
    $('v-return').textContent = $('i-return').value + '%';
    $('v-swr').textContent    = $('i-swr').value + '%';
  }

  ['i-age','i-income','i-expenses','i-savings','i-return','i-swr'].forEach(id => {
    $(id).addEventListener('input', () => {
      syncSliderDisplays();
      calc();
      scheduleSave();
    });
  });

  function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(persist, 1200);
  }

  $('sync-btn').onclick = () => { if (S.pat && S.gistId) pullGist(); };

  // ── Core calculation ──
  function getInputs() {
    return {
      age:      Math.max(0, +$('i-age').value      || 30),
      income:   Math.max(0, +$('i-income').value   || 0),
      expenses: Math.max(0, +$('i-expenses').value || 0),
      savings:  Math.max(0, +$('i-savings').value  || 0),
      ret:      Math.max(0, +$('i-return').value   || 7) / 100,
      swr:      Math.max(0.01, +$('i-swr').value   || 4) / 100,
    };
  }

  function calcFIRE({ age, income, expenses, savings, ret, swr }) {
    const fireNumber    = expenses / swr;
    const annualSavings = income - expenses;
    const savingsRate   = income > 0 ? annualSavings / income : 0;
    const progress      = fireNumber > 0 ? Math.min(1, savings / fireNumber) : 1;

    // Already there
    if (savings >= fireNumber && fireNumber > 0) {
      return { fireNumber, annualSavings, savingsRate, yearsToFire: 0, fireAge: age, progress: 1, canReach: true, alreadyFire: true };
    }

    // Can't reach: spending more than earning AND no existing savings growth alone can do it
    const canGrow = savings > 0 && ret > 0 && savings * Math.pow(1 + ret, 100) >= fireNumber;
    if (annualSavings <= 0 && !canGrow) {
      return { fireNumber, annualSavings, savingsRate, yearsToFire: null, fireAge: null, progress, canReach: false, alreadyFire: false };
    }

    let yearsToFire;
    if (ret === 0) {
      yearsToFire = annualSavings > 0 ? (fireNumber - savings) / annualSavings : null;
    } else if (annualSavings <= 0) {
      // Growth only
      yearsToFire = savings > 0 ? Math.log(fireNumber / savings) / Math.log(1 + ret) : null;
    } else {
      const ratio = (fireNumber + annualSavings / ret) / (savings + annualSavings / ret);
      yearsToFire = ratio > 0 ? Math.log(ratio) / Math.log(1 + ret) : null;
    }

    const fireAge = yearsToFire != null ? age + yearsToFire : null;

    return { fireNumber, annualSavings, savingsRate, yearsToFire, fireAge, progress, canReach: yearsToFire != null, alreadyFire: false };
  }

  function buildProjections({ savings, annualSavings, ret, yearsToFire, fireNumber }) {
    const years = yearsToFire != null ? Math.min(Math.ceil(yearsToFire) + 8, 70) : 60;
    const pts = [];
    let v = savings;
    for (let t = 0; t <= years; t++) {
      pts.push({ t, v });
      v = v * (1 + ret) + annualSavings;
      if (v < 0) v = 0;
    }
    return pts;
  }

  // ── Render ──
  function calc() {
    const inputs = getInputs();
    const result = calcFIRE(inputs);
    renderResults(inputs, result);
    if (result.canReach || result.alreadyFire) {
      const pts = buildProjections({ ...inputs, ...result });
      drawChart(pts, result.fireNumber, result.yearsToFire);
    } else {
      drawChartEmpty();
    }
  }

  function renderResults(inp, r) {
    const panel = $('results-content');

    let html = '';

    if (r.alreadyFire) {
      html += `<div class="banner success">You have already reached your FIRE number. You are financially independent.</div>`;
    } else if (!r.canReach) {
      html += `<div class="banner warning">Your expenses exceed your income with no savings buffer. Reduce expenses or increase income to reach FIRE.</div>`;
    }

    html += `
      <div class="result-main">${fmtMoney(r.fireNumber)}</div>
      <div class="result-sub">FIRE number (expenses / ${(inp.swr*100)}%)</div>
    `;

    // Progress ring + pct
    const pct = (r.progress * 100).toFixed(1);
    const ring = svgRing(r.progress);
    html += `
      <div class="prog-ring-wrap">
        ${ring}
        <div class="prog-info">
          <div class="prog-pct">${pct}%</div>
          <div class="prog-desc">of FIRE number saved</div>
        </div>
      </div>
    `;

    html += `<div class="metrics">`;

    if (r.yearsToFire != null && !r.alreadyFire) {
      html += metric('Years to FIRE', r.yearsToFire.toFixed(1), 'good');
      html += metric('FIRE Age', Math.round(r.fireAge).toString(), 'good');
    } else if (r.alreadyFire) {
      html += metric('Years to FIRE', '0 — already there', 'good');
    }

    html += metric('Annual Savings', fmtMoney(r.annualSavings), r.annualSavings >= 0 ? 'good' : 'warn');
    html += metric('Current Savings', fmtMoney(inp.savings));
    html += `</div>`;

    // Savings rate split bar
    if (inp.income > 0) {
      const rate   = Math.max(0, Math.min(1, r.savingsRate));
      const ratePct = (rate * 100).toFixed(0);
      html += `
        <div class="split-bar-wrap">
          <div class="form-label">Income Split</div>
          <div class="split-bar"><div class="split-fill" style="width:${rate*100}%"></div></div>
          <div class="split-labels">
            <span class="split-label">${ratePct}% saved</span>
            <span class="split-label">${(100-ratePct)}% spent</span>
          </div>
        </div>
      `;
    }

    panel.innerHTML = html;
  }

  function metric(label, val, cls='') {
    return `<div class="metric-row">
      <span class="metric-label">${label}</span>
      <span class="metric-val ${cls}">${val}</span>
    </div>`;
  }

  // ── Progress ring SVG ──
  function svgRing(progress) {
    const r = 28, cx = 34, cy = 34, stroke = 4;
    const circ = 2 * Math.PI * r;
    const dash = Math.min(1, Math.max(0, progress)) * circ;
    return `<svg class="prog-ring" width="68" height="68" viewBox="0 0 68 68">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#1e1e1e" stroke-width="${stroke}"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${progress >= 1 ? '#4a8c4a' : '#c8a96e'}"
        stroke-width="${stroke}" stroke-dasharray="${dash} ${circ}"
        stroke-dashoffset="${circ/4}" stroke-linecap="round" transform="rotate(-90 ${cx} ${cy})"/>
    </svg>`;
  }

  // ── Chart ──
  const CW = 800, CH = 220;
  const PL = 64, PR = 24, PT = 16, PB = 38;
  const IW = CW - PL - PR, IH = CH - PT - PB;

  function drawChart(pts, fireNumber, yearsToFire) {
    const maxV = Math.max(fireNumber * 1.18, pts[pts.length - 1].v * 1.05, 1);
    const maxT = pts[pts.length - 1].t;

    const xS = t => PL + (t / maxT) * IW;
    const yS = v => PT + IH - (v / maxV) * IH;

    // Y grid lines & labels (4 lines)
    let gridLines = '', yLabels = '';
    for (let i = 0; i <= 4; i++) {
      const v = maxV * i / 4;
      const y = yS(v);
      gridLines += `<line x1="${PL}" y1="${y}" x2="${PL+IW}" y2="${y}" stroke="#1a1a1a" stroke-width="1"/>`;
      yLabels   += `<text x="${PL-8}" y="${y+4}" text-anchor="end" fill="#333" font-size="10">${fmtMoney(v)}</text>`;
    }

    // X axis labels (every 5 years)
    let xLabels = '';
    const step = maxT <= 20 ? 5 : maxT <= 40 ? 10 : 15;
    for (let t = 0; t <= maxT; t += step) {
      const x = xS(t);
      xLabels += `<text x="${x}" y="${PT+IH+18}" text-anchor="middle" fill="#333" font-size="10">yr ${t}</text>`;
    }

    // FIRE target line
    const fireY    = yS(fireNumber);
    const fireLineX = PL + IW;
    const fireLine = `<line x1="${PL}" y1="${fireY}" x2="${fireLineX}" y2="${fireY}"
      stroke="#c8a96e" stroke-width="1" stroke-dasharray="5 4" opacity="0.6"/>
      <text x="${fireLineX - 4}" y="${fireY - 6}" text-anchor="end" fill="#c8a96e" font-size="10" opacity="0.8">FIRE target</text>`;

    // Portfolio path
    const linePoints  = pts.map(p => `${xS(p.t)},${yS(p.v)}`).join(' ');
    const firstX = xS(0), firstY = yS(pts[0].v);
    const lastX  = xS(pts[pts.length-1].t), botY = PT + IH;

    const areaPath = `M${firstX},${botY} L${firstX},${firstY} ` +
      pts.slice(1).map(p => `L${xS(p.t)},${yS(p.v)}`).join(' ') +
      ` L${lastX},${botY} Z`;

    // Intersection dot
    let intersectDot = '';
    if (yearsToFire != null && yearsToFire <= maxT) {
      const ix = xS(yearsToFire), iy = fireY;
      intersectDot = `<circle cx="${ix}" cy="${iy}" r="5" fill="#c8a96e"/>
        <circle cx="${ix}" cy="${iy}" r="9" fill="none" stroke="#c8a96e" stroke-width="1" opacity="0.4"/>`;
    }

    // Milestone dots (25%, 50%, 75%)
    let milestoneDots = '';
    if (yearsToFire != null) {
      [0.25, 0.5, 0.75].forEach(frac => {
        const targetYear = yearsToFire * frac;
        const ptIdx = Math.round(targetYear);
        if (ptIdx < pts.length) {
          const mx = xS(pts[ptIdx].t), my = yS(pts[ptIdx].v);
          milestoneDots += `<circle cx="${mx}" cy="${my}" r="3" fill="#2e2e2e" stroke="#444" stroke-width="1"/>`;
        }
      });
    }

    $('chart-svg').innerHTML = `
      <defs>
        <linearGradient id="fill-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#e8e8e8" stop-opacity="0.07"/>
          <stop offset="100%" stop-color="#e8e8e8" stop-opacity="0"/>
        </linearGradient>
        <clipPath id="chart-clip">
          <rect x="${PL}" y="${PT}" width="${IW}" height="${IH}"/>
        </clipPath>
      </defs>
      ${gridLines}${yLabels}${xLabels}
      ${fireLine}
      <g clip-path="url(#chart-clip)">
        <path d="${areaPath}" fill="url(#fill-grad)"/>
        <polyline points="${linePoints}" fill="none" stroke="#e8e8e8" stroke-width="1.5" stroke-linejoin="round"/>
        ${milestoneDots}
        ${intersectDot}
      </g>
      <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+IH}" stroke="#2a2a2a" stroke-width="1"/>
      <line x1="${PL}" y1="${PT+IH}" x2="${PL+IW}" y2="${PT+IH}" stroke="#2a2a2a" stroke-width="1"/>
    `;
  }

  function drawChartEmpty() {
    $('chart-svg').innerHTML = `<text x="400" y="110" text-anchor="middle" fill="#333" font-size="13" font-family="sans-serif">Adjust your numbers to see a projection</text>`;
  }

  // ── Gist API ──
  function ghFetch(pat, path, opts={}) {
    return fetch(API + path, {
      ...opts,
      headers: { 'Authorization': `token ${pat}`, 'Content-Type': 'application/json', ...(opts.headers||{}) }
    });
  }

  async function findGist(pat) {
    for (let page = 1;;page++) {
      const r = await ghFetch(pat, `/gists?per_page=100&page=${page}`);
      if (!r.ok) return null;
      const list = await r.json();
      const hit = list.find(g => g.files[GF]);
      if (hit) {
        const full = await ghFetch(pat, `/gists/${hit.id}`);
        return full.ok ? full.json() : null;
      }
      if (list.length < 100) return null;
    }
  }

  function applyGist(gist) {
    try {
      const c = JSON.parse(gist.files[GF].content);
      if (c.age)      $('i-age').value      = c.age;
      if (c.income)   $('i-income').value   = c.income;
      if (c.expenses) $('i-expenses').value = c.expenses;
      if (c.savings)  $('i-savings').value  = c.savings;
      if (c.ret)      $('i-return').value   = c.ret;
      if (c.swr)      $('i-swr').value      = c.swr;
    } catch(_) {}
  }

  async function pushGist(cfg) {
    if (!S.pat) return;
    setBadge('syncing…');
    const body = {
      description: 'FIRE Calculator — settings', public: false,
      files: { [GF]: { content: JSON.stringify(cfg, null, 2) } }
    };
    const url    = S.gistId ? `/gists/${S.gistId}` : '/gists';
    const method = S.gistId ? 'PATCH' : 'POST';
    const r = await ghFetch(S.pat, url, { method, body: JSON.stringify(body) });
    if (r.ok) {
      const g = await r.json(); S.gistId = g.id; ls('fire_gist_id', g.id);
      setBadge('synced ✓', 'ok');
    } else {
      setBadge('sync failed', 'bad');
    }
  }

  async function pullGist() {
    try {
      setBadge('syncing…');
      const r = await ghFetch(S.pat, `/gists/${S.gistId}`);
      if (!r.ok) { setBadge(''); return; }
      applyGist(await r.json()); syncSliderDisplays(); calc();
      setBadge('synced ✓', 'ok');
    } catch(_) { setBadge(''); }
  }

  // ── Persist ──
  function persist() {
    const inp = getInputs();
    const cfg = { age: inp.age, income: inp.income, expenses: inp.expenses, savings: inp.savings, ret: $('i-return').value, swr: $('i-swr').value };
    ls('fire_cfg', JSON.stringify(cfg));
    if (S.pat) pushGist(cfg);
  }

  // ── Helpers ──
  function ls(k, v) {
    if (v === undefined) return localStorage.getItem(k);
    if (v === null) localStorage.removeItem(k);
    else localStorage.setItem(k, v);
  }

  function setBtn(id, txt, dis) { const b=$(id); b.textContent=txt; b.disabled=dis; }
  function setBadge(txt, cls='') {
    const el = $('sync-badge'); el.textContent = txt;
    el.className = 'sync-badge' + (cls ? ' '+cls : '');
  }

  function fmtMoney(n) {
    if (!isFinite(n) || isNaN(n)) return '—';
    if (n >= 1e6) return '$' + (n/1e6).toFixed(2).replace(/\.?0+$/, '') + 'M';
    if (n >= 1e3) return '$' + Math.round(n/1e3) + 'K';
    return '$' + Math.round(n).toLocaleString();
  }

  boot();
</script>
</body>
</html>
